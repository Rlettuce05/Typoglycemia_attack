name: PR Review

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=.git

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy nltk

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('averaged_perceptron_tagger'); nltk.download('averaged_perceptron_tagger_eng')"

      - name: Run tests
        run: python -m pytest tests/ -v

  close-pr-on-failure:
    name: Comment and Close PR on Failure
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: ${{ always() && (needs.lint.result == 'failure' || needs.test.result == 'failure') }}
    steps:
      - name: Comment failure reason and close PR
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request == null) {
              core.setFailed('No pull request context found.');
              return;
            }

            const lintResult = '${{ needs.lint.result }}';
            const testResult = '${{ needs.test.result }}';

            // Fetch job list for this run to get individual job IDs
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            async function fetchJobLogs(jobName) {
              const job = jobs.find(j => j.name === jobName);
              if (!job) return null;
              try {
                const resp = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });
                return typeof resp.data === 'string' ? resp.data : null;
              } catch {
                return null;
              }
            }

            function extractRelevantLines(logs, maxLines = 50) {
              if (!logs) return null;
              // Strip ANSI colour codes
              const clean = logs.replace(/\x1B\[[0-9;]*[mGKHF]/g, '');
              const lines = clean.split('\n');

              // Patterns that indicate errors / failures
              const errorPattern = /error:|warning:|FAILED|FAIL|AssertionError|E\d{3}|W\d{3}|TypeError|SyntaxError|ImportError|ModuleNotFoundError/i;
              const relevant = lines.filter(l => errorPattern.test(l));

              // Fall back to the last N lines if nothing matched
              const selected = relevant.length > 0 ? relevant : lines.slice(-maxLines);
              return selected.slice(0, maxLines).join('\n').trim();
            }

            const sections = [];

            if (lintResult === 'failure') {
              const logs = await fetchJobLogs('Lint');
              const details = extractRelevantLines(logs);
              sections.push([
                '### ❌ Lint',
                details
                  ? `\`\`\`\n${details}\n\`\`\``
                  : '_ログを取得できませんでした_',
              ].join('\n'));
            }

            if (testResult === 'failure') {
              const logs = await fetchJobLogs('Run Tests');
              const details = extractRelevantLines(logs);
              sections.push([
                '### ❌ テスト',
                details
                  ? `\`\`\`\n${details}\n\`\`\``
                  : '_ログを取得できませんでした_',
              ].join('\n'));
            }

            const body = [
              '## ❌ コードレビューに失敗したため、このPRをクローズします。',
              '',
              '---',
              '',
              ...sections,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed',
            });
