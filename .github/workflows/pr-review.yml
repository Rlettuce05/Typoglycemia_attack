name: PR Review

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    outputs:
      lint_output: ${{ steps.flake8.outputs.lint_output }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        id: flake8
        run: |
          set +e
          output=$(flake8 poisoning_baselines.py clip_score_summary.py baseline_comparison.py tests --max-line-length=120 --exclude=.git,__pycache__ 2>&1)
          exit_code=$?
          {
            echo 'lint_output<<ENDOFOUTPUT'
            echo "$output"
            echo 'ENDOFOUTPUT'
          } >> "$GITHUB_OUTPUT"
          exit $exit_code

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      test_output: ${{ steps.pytest.outputs.test_output }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy nltk pytest

      - name: Download NLTK data
        run: >
          python -c "import nltk;
          nltk.download('averaged_perceptron_tagger');
          nltk.download('averaged_perceptron_tagger_eng')"

      - name: Run tests
        id: pytest
        run: |
          set +e
          output=$(python -m pytest tests/ -v 2>&1)
          exit_code=$?
          {
            echo 'test_output<<ENDOFOUTPUT'
            echo "$output"
            echo 'ENDOFOUTPUT'
          } >> "$GITHUB_OUTPUT"
          exit $exit_code

  close-pr-on-failure:
    name: Comment and Close PR on Failure
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: ${{ always() && (needs.lint.result == 'failure' || needs.test.result == 'failure') }}
    steps:
      - name: Comment failure reason and close PR
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request == null) {
              core.setFailed('No pull request context found.');
              return;
            }

            const lintResult = '${{ needs.lint.result }}';
            const testResult = '${{ needs.test.result }}';
            const lintOutput = `${{ needs.lint.outputs.lint_output }}`.trim();
            const testOutput = `${{ needs.test.outputs.test_output }}`.trim();

            const sections = [];

            if (lintResult === 'failure') {
              sections.push([
                '### ❌ Lint エラー',
                lintOutput
                  ? `\`\`\`\n${lintOutput}\n\`\`\``
                  : '_出力を取得できませんでした_',
              ].join('\n'));
            }

            if (testResult === 'failure') {
              sections.push([
                '### ❌ テスト エラー',
                testOutput
                  ? `\`\`\`\n${testOutput}\n\`\`\``
                  : '_出力を取得できませんでした_',
              ].join('\n'));
            }

            const body = [
              '## ❌ コードレビューに失敗したため、このPRをクローズします。',
              '',
              '---',
              '',
              ...sections,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed',
            });
